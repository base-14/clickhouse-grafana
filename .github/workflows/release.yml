name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Build backend binaries
        uses: magefile/mage-action@v3
        with:
          version: latest
          args: buildAll

      - name: Read plugin metadata
        id: metadata
        run: |
          sudo apt-get install -y jq
          PLUGIN_ID=$(jq -r .id dist/plugin.json)
          PLUGIN_VERSION=$(jq -r .info.version dist/plugin.json)
          ARCHIVE=${PLUGIN_ID}-${PLUGIN_VERSION}.zip
          CHECKSUM=${ARCHIVE}.md5
          echo "plugin-id=${PLUGIN_ID}"       >> $GITHUB_OUTPUT
          echo "plugin-version=${PLUGIN_VERSION}" >> $GITHUB_OUTPUT
          echo "archive=${ARCHIVE}"            >> $GITHUB_OUTPUT
          echo "checksum=${CHECKSUM}"          >> $GITHUB_OUTPUT
          echo "github-tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          if [ "v${{ steps.metadata.outputs.plugin-version }}" != "${{ steps.metadata.outputs.github-tag }}" ]; then
            echo "Plugin version (v${{ steps.metadata.outputs.plugin-version }}) doesn't match tag ${{ steps.metadata.outputs.github-tag }}"
            exit 1
          fi

      - name: Package plugin
        run: |
          mv dist ${{ steps.metadata.outputs.plugin-id }}
          zip ${{ steps.metadata.outputs.archive }} ${{ steps.metadata.outputs.plugin-id }} -r
          md5sum ${{ steps.metadata.outputs.archive }} > ${{ steps.metadata.outputs.checksum }}

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./${{ steps.metadata.outputs.archive }}
            ./${{ steps.metadata.outputs.checksum }}
          body: |
            **Base14 ClickHouse datasource — release ${{ steps.metadata.outputs.github-tag }}**

            ## Installation

            This is an unsigned plugin. Allow it in your Grafana instance:

            ```bash
            export GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=${{ steps.metadata.outputs.plugin-id }}
            ```

            or in `grafana.ini`:

            ```ini
            [plugins]
            allow_loading_unsigned_plugins = ${{ steps.metadata.outputs.plugin-id }}
            ```

            ## Requirements

            - Grafana >= 10.0.3
